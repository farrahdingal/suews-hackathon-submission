<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SUEWS Community Hackathon share card</title>
  <desc id="desc">A dark navy share card with the official SUEWS stacked logo, the words Community Hackathon, and the finding: The hottest place is not the most dangerous.</desc>
  <rect width="1200" height="630" fill="#101827"/>
  <rect x="450" y="42" width="300" height="230" rx="28" fill="#fffaf0"/>
  <image href="suews-logo-stacked-light.svg" x="492" y="54" width="216" height="216" preserveAspectRatio="xMidYMid meet"/>
  <text x="600" y="326"
        font-family="Inter, Arial, sans-serif"
        font-size="20"
        font-weight="800"
        letter-spacing="6"
        fill="#5DADE2"
        text-anchor="middle">COMMUNITY HACKATHON</text>
  <text x="600" y="434"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="50"
        fill="#ffffff"
        text-anchor="middle">The hottest place is not the most dangerous</text>
  <path d="M394 548h412" fill="none" stroke="#0558a5" stroke-width="10" stroke-linecap="round"/>
  <path d="M430 574c46-28 92-28 138 0s92 28 138 0 92-28 138 0" fill="none" stroke="#5DADE2" stroke-width="12" stroke-linecap="round"/>
